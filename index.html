<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gran Catador</title> 
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A028F">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --azul-rey: #0B132B; /* Azul oscuro del diseño */
            --dorado: #F5A700;   /* Amarillo/Dorado */
            --fondo: #F4F6F9;    /* Fondo gris claro */
            --texto-oscuro: #111827;
            --texto-claro: #6b7280;
            --verde-btn: #25D366; /* Verde tipo WhatsApp para el botón de agregar */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--fondo);
            color: var(--texto-oscuro);
            padding-bottom: 80px; /* Espacio para el menú inferior */
        }

        /* --- HEADER --- */
        header {
            background-color: var(--azul-rey);
            padding: 30px 20px 50px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        header p {
            font-size: 12px;
            color: var(--dorado);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- BUSCADOR FLOTANTE --- */
        .search-container {
            margin: -25px 20px 15px 20px;
            background: white;
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            position: relative;
            z-index: 10;
        }

        .search-container i {
            color: var(--texto-claro);
            font-size: 18px;
        }

        .search-container input {
            border: none;
            outline: none;
            width: 100%;
            margin-left: 10px;
            font-size: 15px;
            color: var(--texto-oscuro);
        }

        /* --- CATEGORÍAS --- */
        .categorias-scroll {
            display: flex;
            overflow-x: auto;
            padding: 10px 20px;
            gap: 15px;
            scrollbar-width: none; /* Oculta scroll en Firefox */
        }
        .categorias-scroll::-webkit-scrollbar {
            display: none; /* Oculta scroll en Chrome/Safari */
        }

        .cat-btn {
            background: transparent;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: var(--texto-claro);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .cat-btn.active {
            background: var(--dorado);
            color: var(--texto-oscuro);
        }

        /* --- GRID DE PRODUCTOS --- */
        .productos-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px 20px;
        }

        .producto-card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .producto-card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .info-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            color: var(--texto-claro);
            font-size: 14px;
        }

        .producto-titulo {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 5px;
            color: var(--texto-oscuro);
        }

        .producto-precio {
            font-size: 16px;
            font-weight: 700;
            color: var(--texto-oscuro);
            margin-top: auto;
        }

        .btn-add {
            background: var(--verde-btn);
            color: white;
            border: none;
            border-radius: 10px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            bottom: 12px;
            right: 12px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(37, 211, 102, 0.3);
        }

        /* --- MENÚ INFERIOR (BOTTOM NAV) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px 0 20px 0;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.05);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 100;
        }

        .bottom-nav a {
            color: var(--texto-claro);
            font-size: 22px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .bottom-nav a.active {
            color: var(--azul-rey);
        }

        /* --- CARRITO FLOTANTE --- */
        .cart-float {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: var(--dorado);
            color: var(--texto-oscuro);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(245, 167, 0, 0.4);
            z-index: 99;
            cursor: pointer;
        }
        
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            font-size: 12px;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    </style>
</head>
<body>

    <header>
        <h1>GRAN CATADOR</h1>
        <p>El placer de beber</p>
    </header>

    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="buscador" placeholder="Buscar productos...">
    </div>

    <div class="categorias-scroll">
        <button class="cat-btn active">Promociones</button>
        <button class="cat-btn">Ron</button>
        <button class="cat-btn">Cervezas</button>
        <button class="cat-btn">Whiskys</button>
        <button class="cat-btn">Vodkas</button>
        <button class="cat-btn">Ginebras</button>
    </div>

    <div class="productos-grid" id="lista-productos">
        <div class="producto-card">
            <i class="fa-solid fa-circle-info info-icon"></i>
            <img src="https://via.placeholder.com/150" alt="Ginebra">
            <h3 class="producto-titulo">Ginebra Gordons 0.70L</h3>
            <p class="producto-precio">$11.00</p>
            <button class="btn-add" onclick="agregarAlCarrito('Ginebra Gordons', 11.00)"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div class="producto-card">
            <i class="fa-solid fa-circle-info info-icon"></i>
            <img src="https://via.placeholder.com/150" alt="Ron">
            <h3 class="producto-titulo">Ron Cacique Añejo 1L</h3>
            <p class="producto-precio">$8.50</p>
            <button class="btn-add" onclick="agregarAlCarrito('Ron Cacique', 8.50)"><i class="fa-solid fa-plus"></i></button>
        </div>
        
        <div class="producto-card">
            <i class="fa-solid fa-circle-info info-icon"></i>
            <img src="https://via.placeholder.com/150" alt="Cerveza">
            <h3 class="producto-titulo">Polar Pilsen (Caja)</h3>
            <p class="producto-precio">$15.00</p>
            <button class="btn-add" onclick="agregarAlCarrito('Polar Pilsen Caja', 15.00)"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div class="producto-card">
            <i class="fa-solid fa-circle-info info-icon"></i>
            <img src="https://via.placeholder.com/150" alt="Whisky">
            <h3 class="producto-titulo">Whisky Buchanan's 12</h3>
            <p class="producto-precio">$35.00</p>
            <button class="btn-add" onclick="agregarAlCarrito('Whisky Buchanans 12', 35.00)"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>

    <div class="cart-float" onclick="abrirCarrito()">
        <i class="fa-solid fa-cart-shopping"></i>
        <div class="cart-badge" id="contador-carrito">0</div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="active"><i class="fa-solid fa-house"></i></a>
        <a href="#"><i class="fa-regular fa-user"></i></a>
        <a href="#"><i class="fa-solid fa-list-ul"></i></a>
        <a href="#"><i class="fa-solid fa-gear"></i></a>
    </nav>

    <script>
        let carrito = [];
        let total = 0;

        function agregarAlCarrito(nombre, precio) {
            carrito.push({ nombre, precio });
            actualizarContador();
            // Animación sencilla o alerta (opcional)
            alert(nombre + " agregado al carrito.");
        }

        function actualizarContador() {
            document.getElementById('contador-carrito').innerText = carrito.length;
        }

        function abrirCarrito() {
            if(carrito.length === 0) {
                alert("Tu carrito está vacío");
                return;
            }
            // Aquí puedes enlazar tu lógica anterior para abrir el modal del carrito
            // y enviar los datos a WhatsApp con la Tasa BCV y los métodos de pago.
            console.log("Abriendo carrito...", carrito);
            alert("Tienes " + carrito.length + " productos. (Aquí se abriría tu ventana de pago)");
        }

        // Lógica visual para que los botones de categoría cambien al tocarlos
        const catBtns = document.querySelectorAll('.cat-btn');
        catBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.cat-btn.active').classList.remove('active');
                btn.classList.add('active');
            });
        });
    </script>
</body>
</html>
